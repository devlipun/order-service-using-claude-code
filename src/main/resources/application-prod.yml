spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: order-service-pool-prod
  jpa:
    show-sql: false
  h2:
    console:
      enabled: false  # never expose H2 console in prod

server:
  error:
    include-stacktrace: never
    include-message: never

management:
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: WARN
    com.skmcore.orderservice: WARN
